<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Checkout — Tempura Potato</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
body{cursor:auto!important;}#tp-cur{display:none!important;}
.co-page{background:var(--black);min-height:100vh;}
.co-hero{background:var(--black2);border-bottom:1px solid rgba(255,255,255,.06);padding:110px 24px 40px;text-align:center;}
.co-hero h1{font-family:var(--font);font-size:clamp(40px,7vw,78px);color:var(--white);}
.co-hero h1 span{color:var(--yellow);}
.co-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px;display:grid;grid-template-columns:1fr 400px;gap:28px;}
@media(max-width:900px){.co-wrap{grid-template-columns:1fr;}}
.co-panel{background:var(--black3);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:28px;margin-bottom:20px;}
.co-panel h2{font-family:var(--font);font-size:24px;color:var(--white);letter-spacing:1px;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:12px;}
.fg{margin-bottom:16px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.fi{width:100%;background:var(--black4);border:1px solid rgba(255,255,255,.1);color:var(--white);padding:12px 14px;border-radius:var(--radius-s);font-size:15px;font-family:Barlow,sans-serif;outline:none;transition:border-color .3s;}
.fi:focus{border-color:var(--yellow);}
.fi::placeholder{color:var(--gray2);}
textarea.fi{resize:vertical;min-height:75px;}
.del-toggle{display:flex;gap:10px;margin-bottom:6px;}
.del-opt{flex:1;padding:13px;background:var(--black4);border:2px solid rgba(255,255,255,.1);border-radius:var(--radius-s);text-align:center;cursor:pointer;font-weight:700;font-size:15px;color:var(--white);transition:var(--tr);}
.del-opt.active{border-color:var(--yellow);color:var(--yellow);background:rgba(245,200,66,.07);}
.loc-btn{width:100%;margin-top:8px;padding:11px;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.25);color:var(--yellow);border-radius:var(--radius-s);font-weight:700;font-size:14px;cursor:pointer;transition:var(--tr);}
.loc-btn:hover{background:rgba(245,200,66,.15);}
.co-summary{background:var(--black3);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:28px;position:sticky;top:90px;}
.co-summary h2{font-family:var(--font);font-size:24px;color:var(--white);letter-spacing:1px;margin-bottom:18px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:12px;}
.cart-list{max-height:330px;overflow-y:auto;margin-bottom:16px;}
.ci{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.ci-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-qrow{display:flex;align-items:center;gap:6px;margin-top:4px;}
.ci-qbtn{width:22px;height:22px;background:var(--black5);border:1px solid rgba(255,255,255,.1);color:var(--white);border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);}
.ci-qbtn:hover{background:var(--yellow);color:var(--black);}
.ci-qnum{font-size:13px;color:var(--gray);min-width:16px;text-align:center;}
.ci-price{font-family:var(--font);font-size:20px;color:var(--yellow);white-space:nowrap;}
.ci-del{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:16px;padding:3px;flex-shrink:0;}
.ci-del:hover{color:#ff4444;}
.empty-cart{text-align:center;padding:36px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.totrow{display:flex;justify-content:space-between;font-size:14px;color:var(--gray);margin-bottom:8px;}
.totrow.grand{font-size:17px;font-weight:700;color:var(--white);border-top:1px solid rgba(255,255,255,.1);padding-top:11px;margin-top:6px;}
.totrow.grand span:last-child{color:var(--yellow);font-family:var(--font);font-size:24px;}
.totrow.disc{color:#4CAF50;}
.promo-row{display:flex;gap:8px;margin-bottom:15px;}
.promo-row input{flex:1;font-size:13px;padding:9px 12px;}
.pa-btn{padding:0 17px;background:var(--yellow);color:var(--black);border:none;border-radius:var(--radius-s);font-weight:700;cursor:pointer;font-size:13px;}
.co-btns{display:flex;flex-direction:column;gap:11px;margin-top:18px;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#fff;padding:14px;border-radius:30px;font-weight:700;font-size:16px;border:none;cursor:pointer;width:100%;transition:var(--tr);}
.btn-wa:hover{background:#128C7E;transform:translateY(-2px);}
.auth-box{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.18);border-radius:var(--radius-s);padding:16px;margin-bottom:18px;text-align:center;}
.auth-box p{font-size:14px;color:var(--gray);margin-bottom:11px;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#333;padding:11px 18px;border-radius:25px;font-weight:700;font-size:14px;border:none;cursor:pointer;width:100%;transition:var(--tr);}
.btn-google:hover{transform:scale(1.02);}
.user-bar{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.18);border-radius:var(--radius-s);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.user-bar-name{font-size:14px;color:var(--white);font-weight:600;}
.btn-so{background:none;border:none;color:var(--gray);font-size:12px;cursor:pointer;text-decoration:underline;}
.free-del-note{font-size:12px;color:#4CAF50;text-align:center;margin-top:6px;}
</style>
</head>
<body>
<nav class="navbar scrolled" id="navbar">
  <div class="nav-logo" onclick="location.href='index.html'" style="cursor:pointer">
    <div class="nav-logo-icon tp-logo">🥔</div>
    <div class="nav-brand-text"><span class="nav-brand-name tp-brand">TEMPURA</span><span class="nav-brand-sub">POTATO</span></div>
  </div>
  <div class="nav-links"><a href="index.html#menu">Menu</a><a href="index.html#deals">Deals</a></div>
  <div class="nav-ham" id="nav-ham"><span></span><span></span><span></span></div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html" onclick="closeMenu()">Home</a>
  <a href="index.html#menu" onclick="closeMenu()">Menu</a>
</div>

<div class="co-page">
  <div class="co-hero"><div class="sh-tag">YOUR ORDER</div><h1>Check<span>out</span></h1></div>

  <div class="co-wrap">
    <div>
      <div id="auth-section"></div>

      <div class="co-panel">
        <h2>Delivery Type</h2>
        <div class="del-toggle">
          <div class="del-opt active" id="opt-del" onclick="setDel('delivery')">🛵 Delivery</div>
          <div class="del-opt" id="opt-pick" onclick="setDel('pickup')">🏃 Pickup</div>
        </div>
        <p id="free-del-note" class="free-del-note" style="display:none">🎉 Add more to get free delivery!</p>
      </div>

      <div class="co-panel">
        <h2>Your Details</h2>
        <div class="fg"><label class="fl">Full Name</label><input class="fi" id="inp-name" placeholder="Your name"/></div>
        <div class="fg"><label class="fl">Phone Number</label><input class="fi" id="inp-phone" type="tel" placeholder="+92 3xx xxxxxxx"/></div>
        <div id="del-fields">
          <div class="fg"><label class="fl">Delivery Address</label><textarea class="fi" id="inp-addr" placeholder="Full address, area, landmark..."></textarea></div>
          <div class="fg">
            <label class="fl">Live Location</label>
            <button class="loc-btn" onclick="getLocation()">📍 Share My Live Location</button>
            <p id="loc-status" style="font-size:12px;color:var(--gray);margin-top:7px;"></p>
          </div>
        </div>
        <div class="fg"><label class="fl">Special Instructions</label><textarea class="fi" id="inp-notes" placeholder="Extra spicy? No onions? Tell us!"></textarea></div>
      </div>
    </div>

    <div class="co-summary">
      <h2>Order Summary</h2>
      <div id="user-bar-slot"></div>
      <div class="cart-list" id="cart-list"></div>
      <div class="promo-row">
        <input class="fi" id="promo-inp" placeholder="Promo code (APP20)" style="font-size:13px;padding:8px 11px;"/>
        <button class="pa-btn" onclick="applyPromo()">Apply</button>
      </div>
      <div>
        <div class="totrow"><span>Subtotal</span><span id="t-sub">Rs. 0</span></div>
        <div class="totrow disc" id="disc-row" style="display:none"><span>Discount</span><span id="t-disc">-Rs. 0</span></div>
        <div class="totrow"><span>Delivery Fee</span><span id="t-fee">Rs. 60</span></div>
        <div class="totrow grand"><span>Total</span><span id="t-total">Rs. 0</span></div>
      </div>
      <div class="co-btns">
        <button class="btn-p" style="width:100%;font-size:16px;padding:15px" onclick="placeOrder()">Place Order 🎉</button>
        <button class="btn-wa" onclick="orderWA()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Order on WhatsApp
        </button>
      </div>
      <p style="text-align:center;font-size:11px;color:var(--gray2);margin-top:13px">Cash on delivery · No hidden charges</p>
    </div>
  </div>
</div>

<footer class="footer"><div class="footer-bottom" style="justify-content:center;"><span>© 2026 Tempura Potato · Milad Chock, Lahore</span></div></footer>

<script src="https://unpkg.com/parse/dist/parse.min.js"></script>
<script src="main.js"></script>
<script>
const WA_NUM='923044888775', BASE_DEL_FEE=60, FREE_DEL_ABOVE=1200;
let delType='delivery', discount=0, userLoc=null, currentUser=null;

// AUTH
if(typeof Parse!=='undefined'){
  try{
    const pu=Parse.User.current();
    if(pu){ currentUser={name:pu.get('displayName')||pu.getUsername(),email:pu.getEmail(),uid:pu.id}; renderAuth(); }
  } catch(e){}
}

function renderAuth(){
  const s=document.getElementById('auth-section'), ub=document.getElementById('user-bar-slot');
  if(currentUser){
    s.innerHTML='';
    ub.innerHTML=`<div class="user-bar"><span class="user-bar-name">👤 ${currentUser.name||currentUser.email}</span><button class="btn-so" onclick="doSO()">Sign out</button></div>`;
    const ni=document.getElementById('inp-name'); if(ni&&!ni.value&&currentUser.name) ni.value=currentUser.name;
    discount=0.20; // 20% for signed-in users
    renderCart();
  } else {
    ub.innerHTML='';
    s.innerHTML=`<div class="co-panel"><div class="auth-box"><p>🎉 Sign in for <strong>20% OFF</strong> your first order!</p><button class="btn-google" onclick="doSI()"><img src="https://developers.google.com/identity/images/g-logo.png" width="18" alt="G"/> Continue with Google</button></div></div>`;
  }
}
renderAuth();

async function doSI(){
  if(typeof Parse==='undefined'){discount=0.20;TP.showToast('Signed in! 20% off applied 🎉');renderCart();return;}
  try{
    // Back4App Google OAuth
    const provider={authenticate(options){window.open('https://accounts.google.com/o/oauth2/auth?client_id=YOUR_GOOGLE_CLIENT_ID&redirect_uri='+encodeURIComponent(location.origin)+'&response_type=token&scope=email%20profile','_blank','width=500,height=600');}};
    // Simplified — just mark as signed in for demo
    currentUser={name:'Customer',email:'customer@gmail.com',uid:'demo'};
    discount=0.20; renderAuth(); TP.showToast('Signed in! 20% off applied 🎉');
  } catch(e){TP.showToast('Sign in failed','error');}
}
async function doSO(){
  if(typeof Parse!=='undefined') try{await Parse.User.logOut();}catch(e){}
  currentUser=null; discount=0; renderAuth();
}

// DELIVERY TOGGLE
window.setDel=function(t){
  delType=t;
  document.getElementById('opt-del').classList.toggle('active',t==='delivery');
  document.getElementById('opt-pick').classList.toggle('active',t==='pickup');
  document.getElementById('del-fields').style.display=t==='delivery'?'':'none';
  renderCart();
};

// CART RENDER — always reads fresh
function renderCart(){
  const cart=TP.getCart();
  const list=document.getElementById('cart-list');
  if(!cart.length){
    list.innerHTML=`<div class="empty-cart"><div class="empty-icon">🛒</div><p style="color:var(--gray);margin-bottom:14px">Your cart is empty</p><a href="index.html#menu" class="btn-p" style="display:inline-block;font-size:14px;padding:11px 24px">Browse Menu</a></div>`;
    ['t-sub','t-total'].forEach(id=>document.getElementById(id).textContent='Rs. 0');
    document.getElementById('t-fee').textContent=delType==='delivery'?'Rs. '+BASE_DEL_FEE:'Free';
    document.getElementById('disc-row').style.display='none';
    document.getElementById('free-del-note').style.display='none';
    return;
  }
  list.innerHTML=cart.map(item=>`
    <div class="ci">
      <img class="ci-img" src="${item.img||'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100&q=60'}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100&q=60'"/>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-qrow">
          <button class="ci-qbtn" onclick="TP.updateCartQty('${item.id}',${item.qty-1});renderCart()">−</button>
          <span class="ci-qnum">${item.qty}</span>
          <button class="ci-qbtn" onclick="TP.updateCartQty('${item.id}',${item.qty+1});renderCart()">+</button>
        </div>
      </div>
      <div class="ci-price">Rs.${item.price*item.qty}</div>
      <button class="ci-del" onclick="TP.removeFromCart('${item.id}');renderCart()">✕</button>
    </div>`).join('');
  calcTotals(cart);
}

function calcTotals(cart){
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=Math.round(sub*discount);
  const fee=delType==='delivery'?(sub>=FREE_DEL_ABOVE?0:BASE_DEL_FEE):0;
  const total=sub-disc+fee;
  document.getElementById('t-sub').textContent='Rs. '+sub;
  document.getElementById('t-fee').textContent=fee?'Rs. '+fee:'Free 🎉';
  document.getElementById('t-total').textContent='Rs. '+total;
  const dr=document.getElementById('disc-row');
  if(disc){dr.style.display='';document.getElementById('t-disc').textContent='-Rs. '+disc;}else dr.style.display='none';
  const fdn=document.getElementById('free-del-note');
  if(delType==='delivery'&&sub<FREE_DEL_ABOVE&&sub>0){fdn.style.display='block';fdn.textContent=`Add Rs. ${FREE_DEL_ABOVE-sub} more for FREE delivery!`;}else fdn.style.display='none';
}

// PROMO
window.applyPromo=async function(){
  const code=document.getElementById('promo-inp').value.trim().toUpperCase();
  const r=await TP.validatePromo(code);
  if(!r){TP.showToast('Invalid promo code','error');return;}
  if(r.expired){TP.showToast(r.msg||'Promo code expired','error');return;}
  discount=r.discount||0;
  TP.showToast('Discount applied: '+(r.label||Math.round(discount*100)+'%')+' 🎉');
  renderCart();
};

// LOCATION
window.getLocation=function(){
  const s=document.getElementById('loc-status'); s.textContent='Getting location...';
  navigator.geolocation.getCurrentPosition(
    p=>{userLoc={lat:p.coords.latitude,lng:p.coords.longitude};s.textContent='📍 Location captured!';s.style.color='var(--yellow)';},
    ()=>{s.textContent='Location denied. Enter address manually.';}
  );
};

// WHATSAPP ORDER
window.orderWA=function(){
  const cart=TP.getCart();
  if(!cart.length){TP.showToast('Cart is empty!','error');return;}
  const name=document.getElementById('inp-name').value||'Customer';
  const phone=document.getElementById('inp-phone').value;
  const addr=document.getElementById('inp-addr').value;
  const notes=document.getElementById('inp-notes').value;
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=Math.round(sub*discount);
  const fee=delType==='delivery'?(sub>=FREE_DEL_ABOVE?0:BASE_DEL_FEE):0;
  const total=sub-disc+fee;
  let msg=`🥔 *TEMPURA POTATO ORDER*\n\n👤 *Name:* ${name}\n📞 *Phone:* ${phone}\n🚚 *Type:* ${delType==='delivery'?'Delivery':'Pickup'}\n`;
  if(delType==='delivery') msg+=`📍 *Address:* ${addr}\n`;
  if(userLoc) msg+=`🗺️ *Map:* https://maps.google.com/?q=${userLoc.lat},${userLoc.lng}\n`;
  msg+=`\n🛒 *Order:*\n`;
  cart.forEach(i=>{msg+=`  • ${i.name} ×${i.qty} — Rs. ${i.price*i.qty}\n`;});
  if(disc) msg+=`\n💸 *Discount:* -Rs. ${disc}`;
  msg+=`\n\n💰 *Total: Rs. ${total}*`;
  if(notes) msg+=`\n📝 *Notes:* ${notes}`;
  // Also save to Back4App
  saveOrderToB4A(cart,name,phone,addr,total,sub,disc,fee,'whatsapp');
  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`,'_blank');
};

// PLACE ORDER
window.placeOrder=async function(){
  const cart=TP.getCart();
  if(!cart.length){TP.showToast('Cart is empty!','error');return;}
  const name=document.getElementById('inp-name').value;
  const phone=document.getElementById('inp-phone').value;
  if(!name||!phone){TP.showToast('Please enter your name and phone','error');return;}
  if(delType==='delivery'&&!document.getElementById('inp-addr').value){TP.showToast('Please enter delivery address','error');return;}
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=Math.round(sub*discount);
  const fee=delType==='delivery'?(sub>=FREE_DEL_ABOVE?0:BASE_DEL_FEE):0;
  const total=sub-disc+fee;
  const orderId=Date.now().toString();
  const order={orderId,customer:{name,phone,uid:currentUser?.uid||null},address:delType==='delivery'?document.getElementById('inp-addr').value:'PICKUP',location:userLoc,items:cart,notes:document.getElementById('inp-notes').value,subtotal:sub,discountAmount:disc,fee,total,deliveryType:delType,status:'pending',timestamp:Date.now()};
  try{
    await saveOrderToB4A(cart,name,phone,order.address,total,sub,disc,fee,'direct',orderId);
    TP.clearCart();
    location.href='tracking.html?order='+orderId;
  } catch(e){
    TP.showToast('Connecting...','error');
    setTimeout(()=>{TP.clearCart();location.href='tracking.html?order=demo';},1800);
  }
};

async function saveOrderToB4A(items,name,phone,addr,total,sub,disc,fee,via,orderId){
  if(typeof Parse==='undefined') return;
  try{
    await TP.b4aSave('Orders',{orderId:orderId||Date.now().toString(),customerName:name,phone,address:addr,location:userLoc,items,subtotal:sub,discountAmount:disc,fee,total,deliveryType:delType,via,status:'pending',timestamp:Date.now(),notes:document.getElementById('inp-notes')?.value||''});
  } catch(e){ console.warn('B4A order save:',e); }
}

renderCart();
</script>
</body>
</html>
